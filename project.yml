name: AreWeCooked
options:
  bundleIdPrefix: com.prathambusa
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"

targets:
  AreWeCooked:
    type: application
    platform: macOS
    sources:
      - path: AreWeCooked/Sources
      - path: Shared
    resources:
      - path: AreWeCooked/Resources/AppIcon.icns
      - path: AreWeCooked/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prathambusa.AreWeCooked
        INFOPLIST_FILE: AreWeCooked/Resources/Info.plist
        PRODUCT_NAME: AreWeCooked
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: AreWeCooked/AreWeCooked.entitlements
      properties:
        com.apple.security.network.client: true
    dependencies:
      - target: AreWeCookedWidget
        embed: true
      - sdk: WidgetKit.framework
        weak: false

  AreWeCookedWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: AreWeCookedWidget/Sources
      - path: Shared
    resources:
      - path: AreWeCookedWidget/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prathambusa.AreWeCooked.widget
        INFOPLIST_FILE: AreWeCookedWidget/Resources/Info.plist
        PRODUCT_NAME: AreWeCookedWidget
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: AreWeCookedWidget/AreWeCookedWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  AreWeCookedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AreWeCookedTests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prathambusa.AreWeCookedTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    dependencies:
      - target: AreWeCooked
        embed: false

schemes:
  AreWeCooked:
    build:
      targets:
        AreWeCooked: all
        AreWeCookedWidget: all
        AreWeCookedTests: [test]
    test:
      targets:
        - AreWeCookedTests
